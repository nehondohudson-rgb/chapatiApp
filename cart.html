<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🛒 Your Cart</h1>

  <div id="cart"></div>
  <h2 id="total"></h2>

  <button onclick="checkout()">Checkout</button>

  <script>
    function loadCart() {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let container = document.getElementById("cart");
      let total = 0;

      container.innerHTML = "";

      cart.forEach(item => {
        total += item.price;

        container.innerHTML += `
          <div class="card">
            <h3>${item.name}</h3>
            <p>KSh ${item.price}</p>
          </div>
        `;
      });

      document.getElementById("total").innerText = "Total: KSh " + total;
    }

    function checkout() {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let total = cart.reduce((sum, item) => sum + item.price, 0);

      fetch("https://chapati-api.onrender.com/order", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ items: cart, total: total })
      })
      .then(res => res.json())
      .then(() => {
        alert("Order placed 🚀");
        localStorage.removeItem("cart");
        loadCart();
      });
    }

    loadCart();
  </script>

</body>
</html>
