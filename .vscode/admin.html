<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🖥️ Admin Dashboard</h1>

  <div id="orders"></div>

  <script>
    async function loadOrders() {
      const res = await fetch("https://chapati-api.onrender.com/orders");
      const data = await res.json();

      let container = document.getElementById("orders");
      container.innerHTML = "";

      data.reverse().forEach(order => {
        container.innerHTML += `
          <div class="card">
            <h3>Order ID: ${order.id}</h3>
            <p>Total: KSh ${order.total}</p>
            <p>Status: ${order.status}</p>

            <ul>
              ${order.items.map(i => `<li>${i.name}</li>`).join("")}
            </ul>
          </div>
        `;
      });
    }

    loadOrders();
  </script>

</body>
</html>
