<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🖥️ Admin Dashboard</h1>

  <button onclick="loadOrders()">Refresh</button>

  <div id="orders"></div>

  <script>
    async function loadOrders() {
      const res = await fetch("https://chapati-api.onrender.com/orders");
      const data = await res.json();

      const container = document.getElementById("orders");
      container.innerHTML = "";

      data.reverse().forEach(order => {
        container.innerHTML += `
          <div class="card">
            <h3>Order ID: ${order.id}</h3>
            <p><b>Total:</b> KSh ${order.total}</p>
            <p><b>Status:</b> ${order.status}</p>

            <h4>Items:</h4>
            <ul>
              ${order.items.map(i => `<li>${i.name} - KSh ${i.price}</li>`).join("")}
            </ul>

            <button onclick="updateStatus(${order.id}, 'preparing')">
              Preparing
            </button>

            <button onclick="updateStatus(${order.id}, 'delivered')">
              Delivered
            </button>
          </div>
        `;
      });
    }

    async function updateStatus(id, status) {
      await fetch(`https://chapati-api.onrender.com/order/${id}`, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ status })
      });

      loadOrders();
    }

    loadOrders();
  </script>

</body>
</html>
